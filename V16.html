<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALEMTECH.V16 - OMNI RADAR FULL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        // SISTEMA DE SEGURANÇA ORIGINAL
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('acesso') === 'v16') {
                localStorage.setItem('access_token', 'v16_autorizado');
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (localStorage.getItem('access_token') !== 'v16_autorizado') {
                window.location.href = "https://www.google.com"; 
            }
        })();
    </script>

    <style>
        * { box-sizing: border-box !important; margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; position: fixed; }
        .dashboard { display: flex; width: 100vw; height: 100vh; }
        
        /* Lateral */
        .sidebar { width: 280px; background: #080808; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar-logo { font-weight: 900; color: #f00; font-size: 1.2rem; border-left: 4px solid #f00; padding-left: 10px; text-shadow: 0 0 10px #f00; }
        .ipf-box { background: #050505; padding: 15px; border: 1px solid #333; border-radius: 4px; border-left: 4px solid #f00; }
        .ipf-label { font-size: 10px; color: #f00; text-transform: uppercase; margin-bottom: 5px; }
        .ipf-value { font-size: 1.2rem; font-weight: 900; }

        /* Centro */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #020202; overflow-y: auto; }
        .header { background: #0a0a0a; padding: 15px 25px; border-bottom: 1px solid #222; display: flex; gap: 10px; }
        .url-input { flex: 1; background: #000; border: 1px solid #0f0; padding: 12px; color: #0f0; outline: none; }
        .btn-scan { background: #f00; color: #fff; border: none; padding: 0 20px; font-weight: 900; cursor: pointer; }

        /* Radares */
        .radar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 20px; }
        .radar-card { background: #080808; border: 1px solid #222; padding: 10px; text-align: center; }
        .circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #333; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; transition: 0.5s; }

        /* Gráficos */
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px; height: 200px; }
        .chart-box { background: #080808; border: 1px solid #222; padding: 10px; position: relative; }
        .chart-label { font-size: 10px; color: #0f0; margin-bottom: 5px; text-transform: uppercase; }

        /* Terminal */
        .footer-terminal { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .terminal { background: #000; border: 1px solid #222; padding: 15px; font-size: 11px; color: #0f0; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">ALEMTECH.V16</div>
            <div class="ipf-box">
                <div class="ipf-label">PREJUÍZO ACUMULADO</div>
                <div id="loss-val" class="ipf-value">R$ 0,00</div>
            </div>
            <div class="ipf-box" style="border-color: #0f0;">
                <div class="ipf-label" style="color: #0f0;">OURO RETIDO</div>
                <div id="gold-val" class="ipf-value" style="color: #0f0;">R$ 0,00</div>
            </div>
            <div class="ipf-box" style="border-color: #ff0;">
                <div class="ipf-label" style="color: #ff0;">SYNC TIME</div>
                <div id="sync-clock" class="ipf-value" style="font-size: 14px;">00:00:00:00</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <input type="text" id="url-in" class="url-input" placeholder="SITE ALVO PARA INVESTIGAÇÃO...">
                <button class="btn-scan" onclick="rodar()">VARREDURA</button>
            </div>

            <div class="radar-grid">
                <div class="radar-card"><div class="ipf-label">LCP</div><div class="circle" id="c1">--</div></div>
                <div class="radar-card"><div class="ipf-label">SEO</div><div class="circle" id="c2">--</div></div>
                <div class="radar-card"><div class="ipf-label">FID</div><div class="circle" id="c3">--</div></div>
                <div class="radar-card"><div class="ipf-label">CLS</div><div class="circle" id="c4">--</div></div>
                <div class="radar-card"><div class="ipf-label">MOBILE</div><div class="circle" id="c5">--</div></div>
                <div class="radar-card"><div class="ipf-label">DESKTOP</div><div class="circle" id="c6">--</div></div>
            </div>

            <div class="charts-row">
                <div class="chart-box">
                    <div class="chart-label">LINHA DE TRAÇÃO MENSAL</div>
                    <canvas id="chart1"></canvas>
                </div>
                <div class="chart-box">
                    <div class="chart-label">GRÁFICO DE METAS (ALEMTECH)</div>
                    <canvas id="chart2"></canvas>
                </div>
            </div>

            <div class="footer-terminal">
                <div class="terminal" id="t1">> SISTEMA AGUARDANDO...</div>
                <div class="terminal" id="t2">> ANÁLISE DE CONVERSÃO...</div>
            </div>
        </main>
    </div>

    <script>
        let ms = 0;
        setInterval(() => {
            ms += 13;
            let d = new Date(ms);
            document.getElementById('sync-clock').innerText = d.getUTCHours().toString().padStart(2, '0') + ":" + d.getUTCMinutes().toString().padStart(2, '0') + ":" + d.getUTCSeconds().toString().padStart(2, '0') + ":" + Math.floor(d.getUTCMilliseconds()/10).toString().padStart(2, '0');
        }, 13);

        let c1, c2;
        window.onload = () => {
            c1 = new Chart(document.getElementById('chart1'), { type: 'line', data: { labels: Array.from({length: 10}, (_, i) => i), datasets: [{ borderColor: '#0f0', data: Array.from({length: 10}, () => Math.random()*100), fill: true, backgroundColor: 'rgba(0,255,0,0.1)' }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
            c2 = new Chart(document.getElementById('chart2'), { type: 'bar', data: { labels: ['Atual', 'Meta'], datasets: [{ backgroundColor: ['#f00', '#0f0'], data: [0, 100] }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        };

        async function rodar() {
            let url = document.getElementById('url-in').value;
            if(!url) return;
            document.getElementById('t1').innerHTML += `<br>> ESCANEANDO: ${url}...`;
            
            try {
                const res = await fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=https://${url}&strategy=mobile`);
                const data = await res.json();
                const s = Math.round(data.lighthouseResult.categories.performance.score * 100);
                
                for(let i=1; i<=6; i++) {
                    let el = document.getElementById('c'+i);
                    el.innerText = s + "%";
                    el.style.borderColor = s > 80 ? '#0f0' : '#f00';
                    el.style.boxShadow = `0 0 10px ${el.style.borderColor}`;
                }

                document.getElementById('loss-val').innerText = "R$ " + ((100-s)*950).toLocaleString();
                document.getElementById('gold-val').innerText = "R$ " + ((100-s)*3200).toLocaleString();
                
                c2.data.datasets[0].data[0] = s;
                c2.update();

                document.getElementById('t1').innerHTML += `<br>> FRAGILIDADE: ${100-s}% DETECTADA.`;
                document.getElementById('t2').innerHTML += `<br>> META ALEMTECH: +${100-s}% DE PERFORMANCE.`;
            } catch(e) { document.getElementById('t1').innerHTML += `<br>> ERRO NA CONEXÃO.`; }
        }
    </script>
</body>
</html>
