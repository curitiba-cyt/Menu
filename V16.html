<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALEMTECH.V16 - ELITE OMNI RADAR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        .bg-matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.1; pointer-events: none; z-index: 0; }
        
        .interface { position: relative; z-index: 10; display: grid; grid-template-columns: 320px 1fr 280px; height: 100vh; gap: 10px; padding: 10px; background: rgba(0,5,0,0.9); }
        
        /* Lateral Esquerda */
        .panel-l { background: rgba(10,10,10,0.9); border: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: #f00; border-bottom: 2px solid #f00; padding-bottom: 5px; text-shadow: 0 0 10px #f00; }
        .preview { width: 100%; height: 150px; background: #050505; border: 1px solid #333; overflow: hidden; position: relative; }
        .preview img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        
        .stat-box { background: #080808; border-left: 3px solid #f00; padding: 10px; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-val { font-size: 1.4rem; font-weight: 900; color: #fff; }

        /* Centro */
        .panel-c { display: flex; flex-direction: column; gap: 10px; }
        .scanner-header { background: #111; padding: 15px; border: 1px solid #333; display: flex; gap: 10px; }
        .url-input { flex: 1; background: #000; border: 1px solid #0f0; padding: 10px; color: #0f0; outline: none; }
        .scan-btn { background: #f00; color: #fff; border: none; padding: 0 20px; font-weight: 900; transition: 0.3s; }
        .scan-btn:hover { background: #b00; box-shadow: 0 0 15px #f00; }

        .radar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .radar-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; text-align: center; position: relative; }
        .circle { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #222; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; }

        .big-chart { flex: 1; background: #050505; border: 1px solid #1a1a1a; padding: 15px; position: relative; }
        
        /* Rodapé Diagnóstico */
        .footer-diag { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 120px; }
        .terminal { background: #000; border: 1px solid #222; padding: 10px; font-size: 11px; overflow-y: auto; color: #0f0; }

        /* Animações */
        @keyframes scanline { 0% { top: -100%; } 100% { top: 100%; } }
        .scanline { position: absolute; width: 100%; height: 2px; background: rgba(0,255,0,0.2); animation: scanline 4s linear infinite; }
    </style>
</head>
<body>
    <div class="bg-matrix" id="matrix"></div>
    <div class="interface">
        <div class="panel-l">
            <div class="logo">ALEMTECH V16.ELITE</div>
            <div class="preview">
                <div class="scanline"></div>
                <img id="img-alvo" src="" alt="Aguardando...">
            </div>
            <div class="stat-box">
                <div class="stat-label">PREJUÍZO TÉCNICO ACUMULADO</div>
                <div class="stat-val" id="loss-val" style="color: #f00;">R$ 0,00</div>
            </div>
            <div class="stat-box" style="border-color: #0f0;">
                <div class="stat-label">OURO RETIDO (OPORTUNIDADE)</div>
                <div class="stat-val" id="gold-val" style="color: #0f0;">R$ 0,00</div>
            </div>
            <div class="terminal" id="mini-log" style="height: 150px; font-size: 9px;">
                > SISTEMA PRONTO...<br>> AGUARDANDO ALVO...
            </div>
        </div>

        <div class="panel-c">
            <div class="scanner-header">
                <input type="text" id="url-input" class="url-input" placeholder="INSIRA O DOMÍNIO DO ALVO (EX: GOOGLE.COM)">
                <button class="scan-btn" onclick="iniciarAtaque()">VARREDURA TOTAL</button>
            </div>
            
            <div class="radar-grid">
                <div class="radar-card"><div class="stat-label">LCP</div><div class="circle" id="c1">--</div></div>
                <div class="radar-card"><div class="stat-label">FCP</div><div class="circle" id="c2">--</div></div>
                <div class="radar-card"><div class="stat-label">CLS</div><div class="circle" id="c3">--</div></div>
                <div class="radar-card"><div class="stat-label">FID</div><div class="circle" id="c4">--</div></div>
                <div class="radar-card"><div class="stat-label">SPEED</div><div class="circle" id="c5">--</div></div>
                <div class="radar-card"><div class="stat-label">SEO</div><div class="circle" id="c6">--</div></div>
            </div>

            <div class="big-chart">
                <canvas id="grafico-principal"></canvas>
            </div>

            <div class="footer-diag">
                <div class="terminal" id="diag-box">> DIAGNÓSTICO DE FRAGILIDADE ATIVO...</div>
                <div class="terminal" id="solu-box">> ESTRATÉGIA DE INTERVENÇÃO...</div>
            </div>
        </div>
        
        <div class="panel-r" style="background: #080808; border: 1px solid #222; padding: 10px;">
            <div class="stat-label" style="text-align: center; margin-bottom: 10px;">FLUXO DE DADOS (SYNC)</div>
            <div id="data-flow" style="font-size: 9px; color: #050; height: 100%; overflow: hidden;"></div>
        </div>
    </div>

    <script>
        // Simulação de Matrix no fundo
        const flow = document.getElementById('data-flow');
        setInterval(() => {
            const line = document.createElement('div');
            line.innerText = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            flow.prepend(line);
            if(flow.children.length > 50) flow.lastChild.remove();
        }, 50);

        let chart;
        function initChart() {
            const ctx = document.getElementById('grafico-principal').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 20}, (_, i) => i),
                    datasets: [{
                        label: 'TRAÇÃO DE MERCADO',
                        borderColor: '#0f0',
                        borderWidth: 2,
                        data: Array.from({length: 20}, () => Math.random() * 100),
                        fill: true,
                        backgroundColor: 'rgba(0, 255, 0, 0.1)'
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function iniciarAtaque() {
            let url = document.getElementById('url-input').value;
            if(!url) return;
            if(!url.startsWith('http')) url = 'https://' + url;
            
            document.getElementById('mini-log').innerHTML += `<br>> INICIANDO VARREDURA EM ${url}...`;
            document.getElementById('img-alvo').src = `https://image.thum.io/get/width/400/crop/800/${url}`;

            try {
                const res = await fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&strategy=mobile`);
                const data = await res.json();
                const score = Math.round(data.lighthouseResult.categories.performance.score * 100);
                
                // Preencher círculos
                const colors = score > 80 ? '#0f0' : '#f00';
                for(let i=1; i<=6; i++) {
                    const el = document.getElementById('c'+i);
                    el.innerText = score + "%";
                    el.style.borderColor = colors;
                    el.style.color = colors;
                }

                // Subir Números
                let loss = (100 - score) * 1250;
                document.getElementById('loss-val').innerText = "R$ " + loss.toLocaleString();
                document.getElementById('gold-val').innerText = "R$ " + (loss * 4.5).toLocaleString();
                
                document.getElementById('diag-box').innerHTML = `> ALVO: ${url}<br>> FRAGILIDADE DETECTADA: ${100-score}%<br>> SITE VULNERÁVEL A PERDA DE RETENÇÃO.`;
                document.getElementById('solu-box').innerHTML = `> APLICANDO MÉTODO ALEMTECH...<br>> OTIMIZAÇÃO DE LCP EM CURSO...<br>> RECUPERAÇÃO ESTIMADA: 85%`;

            } catch(e) {
                document.getElementById('mini-log').innerHTML += `<br>> ERRO NA CONEXÃO...`;
            }
        }

        window.onload = initChart;
    </script>
</body>
</html>
