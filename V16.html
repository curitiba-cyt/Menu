<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALEMTECH.V16 - OMNI RADAR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        (function() {
            /* ESTRATÉGIA: Criar escassez e autoridade.
               - O código busca o parâmetro '?acesso=v16' na URL.
               - Se encontrar, gera um token no navegador (localStorage).
               - Se alguém tentar acessar o arquivo sem esse token, o sistema
                 identifica como 'intruso' e joga para o Google na hora.
            */
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('acesso') === 'v16') {
                localStorage.setItem('access_token', 'v16_autorizado');
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (localStorage.getItem('access_token') !== 'v16_autorizado') {
                window.location.href = "https://www.google.com"; 
            }
        })();
    </script>

    <style>
        /* 2. DESIGN DO SISTEMA (A INTERFACE DE COMANDO) */
        * { box-sizing: border-box !important; margin: 0; padding: 0; }
        
        /* Travamos a tela para parecer um software fechado, não um site comum */
        html, body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: #020202; /* Preto Profundo */
            font-family: 'Inter', sans-serif; color: #fff; 
            position: fixed; top: 0; left: 0; 
        }
        
        /* SIDEBAR: Onde o dinheiro "sangra". Tons de vermelho para criar urgência. */
        .sidebar { 
            width: 300px; background: #080808; border-right: 1px solid #1a1111; 
            display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; 
        }
        
        /* LOGO: Identidade visual agressiva com borda em destaque. */
        .sidebar-logo { 
            font-weight: 900; color: #ff0000; margin-bottom: 25px; 
            font-size: 1.4rem; letter-spacing: 3px; border-left: 5px solid #ff0000; 
            padding-left: 12px; 
        }
        
        /* LIVE PREVIEW: Usa o Thum.io para mostrar o print do site alvo. 
           Isso faz o cliente sentir que "estamos dentro" do sistema dele. */
        .live-preview-box { 
            border: 1px solid #333; height: 180px; background: #000; 
            position: relative; overflow: hidden; margin-bottom: 20px; 
            border-radius: 4px; box-shadow: inset 0 0 20px #000; 
        }
        #site-preview { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        
        /* CAIXAS DE VALOR: Onde calculamos o prejuízo técnico. 
           Gatilho mental: Mostrar o quanto de dinheiro ele está perdendo HOJE. */
        .ipf-box { 
            background: linear-gradient(180deg, #1a0505 0%, #000 100%); 
            padding: 18px; border: 1px solid #3d0000; border-radius: 4px; 
            margin-bottom: 15px; 
        }
        
        /* MAIN CONTENT: Área dos gráficos e inputs de varredura. */
        .main-content { flex: 1; height: 100vh; overflow-y: auto; background: #040404; }
        
        /* INPUT DE INVESTIGAÇÃO: Onde você digita o domínio do alvo. */
        .analysis-input { 
            flex: 1; background: #000; border: 1px solid #333; padding: 14px; 
            color: #00ff00; font-family: monospace; outline: none; 
        }
        
        /* CÍRCULOS DE PROGRESSO: Usam conic-gradient para preencher visualmente 
           a saúde do site (Verde = Ok, Vermelho = Crítico). */
        .progress-circle { width: 35px; height: 35px; border-radius: 50%; background: #222; margin: 0 auto 8px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">ALEMTECH.V16</div>
            <div class="live-preview-box"><img id="site-preview" src="" alt="Radar Ativo..."></div>
            
            <div class="ipf-box">
                <div class="ipf-label">PREJUÍZO TÉCNICO ACUMULADO</div>
                <div id="valor-perda" class="ipf-value">R$ 0,00</div> </div>

            <div class="ipf-box" style="border-color: #004d00; background: linear-gradient(180deg, #051a05 0%, #000 100%);">
                <div class="ipf-label" style="color: #00ff00;">OURO RETIDO (CONVERSÃO)</div>
                <div id="valor-oportunidade" class="ipf-value" style="color: #00ff00;">R$ 0,00</div>
            </div>

            <div class="ipf-box" style="border-color: #00ff00; background: #000;">
                <div class="ipf-label">SYNC RADAR (SISTEMA)</div>
                <div id="relogio-sync" class="ipf-value" style="color: #00ff00; font-size: 1rem;">00:00:00:00</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="analysis-header" style="display:flex; padding:20px; gap:10px;">
                <input type="text" id="siteUrl" class="analysis-input" placeholder="URL DO ALVO PARA INVESTIGAÇÃO:">
                <button class="analysis-btn" style="background:#ff0000; color:#fff; border:none; padding:0 20px; cursor:pointer; font-weight:900;" onclick="executarVarredura()">VARREDURA TOTAL</button>
            </div>

            <div class="chart-container" style="padding:30px; height:250px;">
                <div style="color:#00ff00; font-family:monospace; font-size:10px; margin-bottom:10px;">MONITORAMENTO DE TRÁFEGO (30D)</div>
                <canvas id="monthChart"></canvas>
            </div>

            <div class="chart-container" style="padding:30px; height:250px;">
                <div style="color:#ff0000; font-family:monospace; font-size:10px; margin-bottom:10px;">VOLATILIDADE DE CONVERSÃO (24H)</div>
                <canvas id="dayChart"></canvas>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; padding:30px;">
                <div id="text-diag" style="background:#080808; padding:20px; border-left:4px solid #ff0000; color:#888; font-size:13px;">Aguardando alvo para diagnóstico de fragilidade...</div>
                <div id="text-solu" style="background:#080808; padding:20px; border-left:4px solid #00ff00; color:#888; font-size:13px;">Aguardando dados para plano de intervenção...</div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "AIzaSyBQs2rBfgU_0JEJ8pFnNHnQ07l1NtPBOV0"; // Chave do Google PageSpeed
        let scanning = false;
        let ms = 0;

        /* FUNÇÃO SUBIR NÚMERO: 
           Não mostra o valor de uma vez. Ele "corre" de 0 até o valor final.
           Por que? Porque ver o prejuízo aumentar na frente dos olhos causa choque.
        */
        function subirNumero(id, valorFinal) {
            let el = document.getElementById(id);
            let atual = 0;
            let step = valorFinal / 50;
            let timer = setInterval(() => {
                atual += step;
                if (atual >= valorFinal) {
                    el.innerText = "R$ " + valorFinal.toLocaleString('pt-BR');
                    clearInterval(timer);
                } else {
                    el.innerText = "R$ " + Math.floor(atual).toLocaleString('pt-BR');
                }
            }, 20);
        }

        /* SISTEMA DE RELÓGIO SYNC: 
           Cria aquela contagem rápida de milissegundos para dar ar de processamento pesado.
        */
        setInterval(() => {
            ms += 13;
            let d = new Date(ms);
            document.getElementById('relogio-sync').innerText = d.getUTCHours().toString().padStart(2,'0') + ":" + d.getUTCMinutes().toString().padStart(2,'0') + ":" + d.getUTCSeconds().toString().padStart(2,'0') + ":" + Math.floor(d.getUTCMilliseconds()/10).toString().padStart(2,'0');
        }, 13);

        /* EXECUÇÃO DA VARREDURA (O ATAQUE):
           1. Pega a URL.
           2. Dispara contra a API do Google PageSpeed.
           3. Recebe a nota de performance.
           4. Calcula: Perda = (100 - Nota) * Fator AlemTech.
        */
        async function executarVarredura() {
            let site = document.getElementById('siteUrl').value;
            if(!site) return;
            
            // Ativa o preview do site do cliente
            document.getElementById('site-preview').src = `https://image.thum.io/get/width/400/crop/800/https://${site}`;

            try {
                const response = await fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=https://${site}&key=${API_KEY}`);
                const data = await response.json();
                const score = data.lighthouseResult.categories.performance.score * 100;

                // Transforma a nota em dor financeira
                subirNumero('valor-perda', (100 - score) * 1250); 
                subirNumero('valor-oportunidade', (100 - score) * 4500);

                // Preenche o Diagnóstico
                document.getElementById('text-diag').innerHTML = `<b style="color:#ff0000;">FRAGILIDADE DETECTADA:</b> Seu ativo possui ${100-score}% de atrito digital. Isso é um vazamento de caixa direto para o ralo.`;
                document.getElementById('text-solu').innerHTML = `<b style="color:#00ff00;">INTERVENÇÃO:</b> Aplicando o método AlemTech, estancamos esse vazamento e convertemos o prejuízo em Ouro Retido.`;
                
                scanning = true; // Ativa os gráficos
            } catch (e) { alert("Erro na sincronia do radar."); }
        }

        /* CONFIGURAÇÃO DE GRÁFICOS (CHART.JS):
           Gráficos minimalistas para focar apenas na oscilação dos dados.
        */
        const ctxM = document.getElementById('monthChart').getContext('2d');
        new Chart(ctxM, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ data: Array.from({length: 30}, () => Math.random() * 100), borderColor: '#333', borderWidth: 1, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { grid: { color: '#111' } } }, plugins: { legend: { display: false } } }
        });

        const ctxD = document.getElementById('dayChart').getContext('2d');
        new Chart(ctxD, {
            type: 'line',
            data: { labels: Array(24).fill(''), datasets: [{ data: Array.from({length: 24}, () => Math.random() * 100), borderColor: '#ff0000', borderWidth: 1, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { grid: { color: '#111' } } }, plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
