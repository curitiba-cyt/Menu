<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALEMTECH.V16 - OMNI RADAR</title>
    
    <script>
    //<![CDATA[
        (function() {
            // 1. TENTA CAPTURAR A CHAVE NA URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('acesso') === 'v16') {
                localStorage.setItem('access_token', 'v16_autorizado');
                // Limpa a URL para não ficar feio, mas mantém na página
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // 2. VERIFICAÇÃO FINAL
            if (localStorage.getItem('access_token') !== 'v16_autorizado') {
                window.location.replace("https://www.google.com"); 
            }
        })();
    //]]>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ESTILO DE PROTEÇÃO: SÓ MOSTRA O CONTEÚDO SE TIVER A CHAVE */
        body { display: none; background: #020202; }
        .auth-ok body { display: block !important; }

        * { box-sizing: border-box !important; margin: 0; padding: 0; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; position: fixed; top: 0; left: 0; }
        .dashboard { display: flex; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 9999; background: #020202; }
        .sidebar { width: 300px; background: #080808; border-right: 1px solid #1a1111; display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .sidebar-logo { font-weight: 900; color: #ff0000; margin-bottom: 25px; font-size: 1.4rem; letter-spacing: 3px; border-left: 5px solid #ff0000; padding-left: 12px; }
        .live-preview-box { border: 1px solid #333; height: 180px; background: #000; position: relative; overflow: hidden; margin-bottom: 20px; border-radius: 4px; }
        #site-preview { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .ipf-box { background: linear-gradient(180deg, #1a0505 0%, #000 100%); padding: 18 : px; border: 1px solid #3d0000; border-radius: 4px; margin-bottom: 15px; }
        .ipf-label { font-size: 0.6rem; color: #ff4d4d; text-transform: uppercase; font-weight: 800; }
        .ipf-value { font-family: 'Courier New', monospace; font-size: 1.4rem; font-weight: 900; color: #fff; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; background: #040404; display: flex; flex-direction: column; }
        .analysis-header { background: #0a0a0a; padding: 20px 30px; border-bottom: 1px solid #151515; display: flex; gap: 15px; position: sticky; top: 0; z-index: 1000; }
        .analysis-input { flex: 1; background: #000; border: 1px solid #333; padding: 14px; color: #00ff00; font-family: monospace; outline: none; }
        .analysis-btn { background: #ff0000; color: #fff; border: none; padding: 0 30px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .mini-stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; padding: 20px 30px; }
        .mini-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 4px; text-align: center; }
        .mini-label { font-size: 0.55rem; color: #888; font-weight: 800; text-transform: uppercase; }
        .mini-value { font-size: 1.1rem; font-weight: 900; font-family: monospace; }
        .progress-circle { width: 35px; height: 35px; border-radius: 50%; background: #222; margin: 8px auto; }
        .chart-container { background: #080808; border: 1px solid #1a1a1a; padding: 20px; margin: 0 30px 20px; border-radius: 4px; height: 200px; }
        .report-section { margin: 0 30px 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .text-block { background: #080808; border: 1px solid #1a1a1a; padding: 20px; border-radius: 4px; }
        .content-area { font-size: 0.85rem; color: #aaa; height: 200px; overflow-y: auto; }
    </style>
</head>
<body onload="document.documentElement.classList.add('auth-ok'); initCharts();">
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">ALEMTECH.V16</div>
            <div class="live-preview-box"><img id="site-preview" src="" alt="Radar Offline"></div>
            <div class="ipf-box">
                <div class="ipf-label">PREJUÍZO TÉCNICO</div>
                <div id="valor-perda" class="ipf-value">R$ 0,00</div>
            </div>
            <div class="ipf-box" style="border-color: #00ff00;">
                <div class="ipf-label" style="color:#00ff00">OURO RETIDO</div>
                <div id="valor-oportunidade" class="ipf-value" style="color:#00ff00">R$ 0,00</div>
            </div>
            <div class="ipf-box">
                <div class="ipf-label">SYNC RADAR</div>
                <div id="relogio-sync" class="ipf-value" style="font-size: 1rem; color:#00ff00">00:00:00:00</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="analysis-header">
                <input type="text" id="siteUrl" class="analysis-input" placeholder="DOMÍNIO DO ALVO...">
                <button class="analysis-btn" id="btn-scan" onclick="executarVarredura()">VARREDURA</button>
            </div>

            <div class="mini-stats-grid">
                <div class="mini-card"><div class="mini-label">LCP</div><div class="progress-circle" id="circ-perf"></div><div id="val-perf" class="mini-value">--</div></div>
                <div class="mini-card"><div class="mini-label">SEO</div><div class="progress-circle" id="circ-seo"></div><div id="val-seo" class="mini-value">--</div></div>
                <div class="mini-card"><div class="mini-label">LOAD</div><div class="progress-circle" id="circ-acc"></div><div id="val-acc" class="mini-value">--</div></div>
                <div class="mini-card"><div class="mini-label">MOBILE</div><div class="progress-circle" id="circ-bp"></div><div id="val-bp" class="mini-value">--</div></div>
                <div class="mini-card"><div class="mini-label">DESKTOP</div><div class="progress-circle" id="circ-cls"></div><div id="val-cls" class="mini-value">--</div></div>
                <div class="mini-card"><div class="mini-label">UX/FID</div><div class="progress-circle" id="circ-fid"></div><div id="val-fid" class="mini-value">--</div></div>
            </div>

            <div class="chart-container">
                <canvas id="monthChart"></canvas>
            </div>

            <div class="report-section">
                <div class="text-block" style="border-left: 4px solid red">
                    <div id="text-diag" class="content-area">Aguardando alvo...</div>
                </div>
                <div class="text-block" style="border-left: 4px solid green">
                    <div id="text-solu" class="content-area">Análise pendente...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
    //<![CDATA[
        const API_KEY = "AIzaSyBQs2rBfgU_0JEJ8pFnNHnQ07l1NtPBOV0";
        let ms = 0;

        function subirNumero(id, valorFinal) {
            let el = document.getElementById(id);
            let atual = 0;
            let step = valorFinal / 50;
            let timer = setInterval(() => {
                atual += step;
                if(atual >= valorFinal) {
                    el.innerText = "R$ " + valorFinal.toLocaleString('pt-BR');
                    clearInterval(timer);
                } else {
                    el.innerText = "R$ " + Math.floor(atual).toLocaleString('pt-BR');
                }
            }, 20);
        }

        setInterval(() => {
            ms += 13;
            let d = new Date(ms);
            document.getElementById('relogio-sync').innerText = d.getUTCHours().toString().padStart(2, '0') + ":" + d.getUTCMinutes().toString().padStart(2, '0') + ":" + d.getUTCSeconds().toString().padStart(2, '0') + ":" + Math.floor(d.getUTCMilliseconds()/10).toString().padStart(2, '0');
        }, 13);

        function initCharts() {
            new Chart(document.getElementById('monthChart'), {
                type: 'line',
                data: { labels: Array.from({length: 30}, (_, i) => i + 1), datasets: [{ borderColor: '#ccff00', data: Array(30).fill(0).map(() => Math.random()*100), tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function executarVarredura() {
            let url = document.getElementById('siteUrl').value;
            if(!url) return;
            document.getElementById('btn-scan').innerText = "INVESTIGANDO...";
            document.getElementById('site-preview').src = `https://image.thum.io/get/width/400/crop/800/https://${url.replace('https://','')}`;
            
            try {
                const r = await fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=https://${url.replace('https://','')}&key=${API_KEY}&strategy=mobile&category=performance`);
                const d = await r.json();
                const score = Math.round(d.lighthouseResult.categories.performance.score * 100);
                
                document.getElementById('val-perf').innerText = score;
                document.getElementById('circ-perf').style.background = `conic-gradient(#ff0000 ${score}%, #222 0%)`;
                
                subirNumero('valor-perda', (100 - score) * 950);
                subirNumero('valor-oportunidade', (100 - score) * 4200);
                
                document.getElementById('text-diag').innerText = "VULNERABILIDADE DETECTADA. O ATIVO APRESENTA FUGA DE CAPITAL POR LENTIDÃO ESTRUTURAL.";
                document.getElementById('text-solu').innerText = "MÉTODO ALEMTECH APLICÁVEL. INTERVENÇÃO NECESSÁRIA PARA RECUPERAR O OURO RETIDO.";
                document.getElementById('btn-scan').innerText = "CONCLUÍDO";
            } catch(e) { document.getElementById('btn-scan').innerText = "ERRO"; }
        }
    //]]>
    </script>
</body>
</html>
