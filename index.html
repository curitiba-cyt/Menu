        body {

        .container {

        /* IMAGEM DE PERFIL - IMPACTO VISUAL */

        /* GRID DE BOTÕES LADO A LADO */
        .grid-duplo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .botoes {
            display: flex;
            flex-direction: column;

        /* ESTILO DOS BOTÕES ALEMTECH */

            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            padding: 18px 10px;
            border: 1px solid #333;
        }

        /* BOTÃO DE DESTAQUE (CURA ESCONDIDA) */
        .primario {
            background: #e0e0e0; /* Cinza Metálico */
            color: #000;
        }

        /* BOTÕES DE INFRAESTRUTURA */
        .secundario {
            background: #111;
            color: #fff;
            border: 1px solid #222;
        }

        /* BOTÃO DE CONTATO/WHATSAPP (O TIRO) */
        .destaque {
            background: transparent;
            color: #00ff4c;
            border: 1px solid #00ff4c;
            margin-top: 10px;
        }

        .botao:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(0,255,76,0.1);
        }

        .seta { margin-left: 8px; font-size: 18px; }
