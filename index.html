        }

        body {
            background-color: #000; /* Fundo Total Preto - Blindagem */
            color: #fff;

        .container {

        /* IMAGEM 16:9 - FORMATO CAPA CINEMATOGRÁFICA */
        .perfil {

        /* GRID PARA BOTÕES LADO A LADO */
        .grid-topo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .lista-botoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .botao {
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            border-radius: 6px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            padding: 20px 10px;
            border: 1px solid #333;
        }

        /* ESTILO ALEMTECH - CINZA METÁLICO (AUTORIDADE) */
        .primario {
            background: #d1d1d1;
            color: #000;
        }

        /* ESTILO INFRA - PRETO E SÓBRIO */
        .secundario {
            background: #0a0a0a;
            color: #eee;
            border: 1px solid #222;
        }

        /* BOTÃO DE TIRO FINAL - WHATSAPP */
        .whatsapp {
            background: transparent;
            color: #00ff4c;
            border: 1px solid #00ff4c;
            margin-top: 8px;
        }

        .botao:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
