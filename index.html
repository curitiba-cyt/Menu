<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AlemTech | Infraestrutura de Elite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000; /* Fundo Total Preto - Blindagem */
            color: #fff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px 15px;
        }

        /* IMAGEM 16:9 - FORMATO CAPA CINEMATOGRÁFICA */
        .perfil {
            width: 100%;
            aspect-ratio: 16 / 9; 
            margin-bottom: 20px;
            background-image: url("https://blogger.googleusercontent.com/img/a/AVvXsEgbAg7W_m4Rr6zZBQvxHOTMjekJB7_zYZydhWNBLiSMiE5jj6Dn1gbIfwXgLWMugNjVlpoCuQfacAxidaAr-JqKg7919mkV10KZ_12awpoXNpTqZNLoLWhuRBohHNc9hLbKPbGdpsObqEMgJ6NCwaa5XvsDX8kPo7X18LStPDLhQqE4xyqLHSrz2DhufXI");
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            border: 1px solid #222;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        /* GRID PARA BOTÕES LADO A LADO */
        .grid-topo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .lista-botoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .botao {
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            border-radius: 6px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            padding: 20px 10px;
            border: 1px solid #333;
        }

        /* ESTILO ALEMTECH - CINZA CLARO */
        .primario {
            background: #d1d1d1;
            color: #000;
        }

        /* ESTILO ATUALIZADO: BOTÕES CINZA COM TEXTO PRETO */
        .secundario {
            background: #808080; /* Cinza médio/sóbrio */
            color: #000; /* Texto em preto como solicitado */
            border: 1px solid #999;
        }

        /* BOTÃO DE TIRO FINAL - WHATSAPP */
        .whatsapp {
            background: transparent;
            color: #00ff4c;
            border: 1px solid #00ff4c;
            margin-top: 8px;
        }

        .botao:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .seta { margin-left: 8px; }
    </style>
</head>
